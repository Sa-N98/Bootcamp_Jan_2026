<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Welcome to the User Dashboard {{ user.username }}!</h1>

    {% for movie in movies %}
        <div class="movie-card">
            <img
                src="{{ movie.poster }}"
                alt="{{ movie.title }} poster"
                class="movie-poster"
            />
            <h2 class="movie-title">{{ movie.title }}</h2>
            {% for theater in movie.theaters_list %}
                <p>{{ theater.name }} - {{ theater.location }}</p>
            {% endfor %}
            
        </div>
    {% endfor %}
    
</body>
</html>
